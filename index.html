<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kuberas Lotus | Trading Technology Ecosystem</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-bg"></div>

    <header class="hero">
      <p class="eyebrow">Kuberas Lotus</p>
      <h1>Trading Technology Ecosystem</h1>
      <p class="subtitle">Research Driven Trading Infrastructure</p>
    </header>

    <main>
      <section class="map-section" aria-label="Interactive ecosystem map">
        <div id="ecosystem-map" class="ecosystem-map">
          <svg id="connections" class="connections" aria-hidden="true"></svg>
          <div id="nodes-layer" class="nodes-layer"></div>
        </div>
      </section>

      <section class="pipeline" aria-label="Research pipeline">
        <h2>Research Pipeline</h2>
        <ol>
          <li>Market Data</li>
          <li>Event Detection</li>
          <li>Signal Engine</li>
          <li>Safe Entry</li>
          <li>Trade Execution</li>
          <li>Research Feedback</li>
        </ol>
      </section>
    </main>

    <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-card">
        <button id="close-modal" class="close-modal" aria-label="Close details">×</button>
        <h3 id="modal-title"></h3>
        <p id="modal-description"></p>
        <a id="repo-link" class="repo-link" href="#" target="_blank" rel="noopener noreferrer">Open Repository</a>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
